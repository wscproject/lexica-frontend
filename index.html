<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.png"
      rel="icon"
      media="(prefers-color-scheme: light)"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon-dark.png"
      rel="icon"
      media="(prefers-color-scheme: dark)"
    />

    <meta
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
      name="viewport"
    />

    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />

    <!-- Dark mode -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#101418"
    />

    <link
      rel="preload"
      href="/font/Inter/InterVariable.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <title>Lexica</title>
  </head>

    <script type="module" src="/src/main.js"></script>
